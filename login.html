<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aerosense Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(120deg, #e8f5e9, #c8e6c9);
        }

        .left-section {
            width: 50%;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: slideIn 0.8s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .login-box {
            width: 400px;
            background: white;
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .logo {
            width: 95px;
            display: block;
            margin: 0 auto 8px;
        }

        .title {
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            color: #2e7d32;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 26px;
        }

        .tab-buttons {
            display: flex;
            background: #f1f8f6;
            border-radius: 30px;
            padding: 5px;
            margin-bottom: 26px;
        }

        .tab-buttons button {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 30px;
            background: transparent;
            font-weight: 600;
            color: #444;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-buttons .active {
            background: #2e7d32;
            color: white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .input-box {
            margin-bottom: 18px;
        }

        .input-box label {
            font-weight: 500;
            display: block;
            margin-bottom: 6px;
        }

        .input-box input {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #43a047;
            box-shadow: 0 0 0 2px rgba(67,160,71,0.2);
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #43a047, #2e7d32);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 14px;
        }

        .links a {
            font-size: 14px;
            color: #2e7d32;
            text-decoration: none;
            font-weight: 500;
        }

        .back-home {
            text-align: center;
            margin-top: 16px;
        }

        .back-home a {
            text-decoration: none;
            font-size: 14px;
            color: #555;
        }

        .right-section {
            width: 50%;
            background: url("images/login.jpg") no-repeat center/cover;
            position: relative;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 90, 40, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 40px;
        }

        .overlay h2 {
            font-size: 34px;
            margin-bottom: 14px;
        }

        .overlay p {
            font-size: 17px;
            width: 75%;
            margin: auto;
        }

        .stats-boxes {
            display: flex;
            gap: 20px;
            margin-top: 28px;
            justify-content: center;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            padding: 16px 22px;
            border-radius: 14px;
            backdrop-filter: blur(6px);
            min-width: 130px;
        }
    </style>

    <script>
        let selectedRole = "user";

        function switchRole(role) {
            selectedRole = role;
            document.getElementById("userBtn").classList.toggle("active", role === "user");
            document.getElementById("adminBtn").classList.toggle("active", role === "admin");
        }

        function loginUser(event) {
            event.preventDefault();

            // Store login state
            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("role", selectedRole);

            if (selectedRole === "user") {
                window.location.href = "user_home.html";
            } else {
                window.location.href = "admin_home.html";
            }
        }
    </script>
</head>

<body>

    <div class="left-section">
        <div class="login-box">
            <img src="images/logo.png" class="logo">

            <div class="title">AEROSENSE</div>
            <div class="subtitle">Connecting Sensors, Insights & Smart Farming</div>

            <div class="tab-buttons">
                <button id="userBtn" class="active" onclick="switchRole('user')">User</button>
                <button id="adminBtn" onclick="switchRole('admin')">Admin</button>
            </div>

            <form onsubmit="loginUser(event)">
                <div class="input-box">
                    <label>Email / Phone</label>
                    <input type="text" placeholder="Enter email or phone" required>
                </div>

                <div class="input-box">
                    <label>Password</label>
                    <input type="password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="links">
                <a href="forgot-password.html">Forgot Password?</a>
                <a href="signup.html">Sign Up</a>
            </div>

            <div class="back-home">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <div class="right-section">
        <div class="overlay">
            <div>
                <h2>Smart Farming Starts Here</h2>
                <p>Monitor birds, automate health detection, and improve farm efficiency with IoT + AI analytics.</p>

                <div class="stats-boxes">
                    <div class="stat">
                        <h3>500+</h3>
                        <p>Active Farms</p>
                    </div>
                    <div class="stat">
                        <h3>1200+</h3>
                        <p>Devices Installed</p>
                    </div>
                    <div class="stat">
                        <h3>₹40Cr+</h3>
                        <p>Insights Delivered</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
