<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Predictions | AEROSENSE</title>

<style>
/* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #e8f5e9;
}

.page-overlay {
    background: rgba(255,255,255,0.95);
    min-height: 100vh;
    padding: 30px 20px;
}

/* ================= NAVBAR ================= */
.navbar {
    background: linear-gradient(90deg, #1b5e20, #2e7d32);
    color: white;
    padding: 16px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    position: sticky;
    top: 0;
    z-index: 999;
}

.logo {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 1.5px;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 24px;
    font-size: 15px;
    opacity: 0.95;
    transition: opacity 0.25s ease;
}

.navbar a:hover {
    opacity: 1;
    text-decoration: underline;
}

/* ================= HEADER ================= */
.container h1 {
    text-align: center;
    color: #1b5e20;
    font-size: 34px;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: #444;
    font-size: 18px;
    margin-bottom: 40px;
}

/* ================= SUMMARY CARDS ================= */
.summary-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 25px;
    margin-bottom: 40px;
}

.summary-card {
    background: rgba(255,255,255,0.88);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.summary-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 26px rgba(0,0,0,0.18);
}

.summary-title {
    font-size: 16px;
    color: #555;
    margin-bottom: 10px;
}

.summary-value {
    font-size: 28px;
    font-weight: bold;
    color: #2e7d32;
}

/* ================= SEARCH BAR ================= */
.search-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.search-bar input[type="text"] {
    width: 250px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 15px;
    margin-bottom: 10px;
}

.search-bar button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: #43a047;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s ease;
}

.search-bar button:hover {
    background: #2e7d32;
}

/* ================= PREDICTIONS TABLE ================= */
.predictions-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 50px;
}

.predictions-table th, .predictions-table td {
    padding: 14px 12px;
    text-align: left;
    border: 1px solid #ccc;
    font-size: 14px;
}

.predictions-table th {
    background: #c8f7c5;
    color: #1b5e20;
    font-weight: 600;
}

.predictions-table td {
    background: #ffffff;
}

.action-btn {
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    margin-right: 5px;
    transition: background 0.3s ease;
}

.view-btn {
    background: #2196f3;
    color: white;
}

.view-btn:hover {
    background: #0b79d0;
}

.delete-btn {
    background: #f44336;
    color: white;
}

.delete-btn:hover {
    background: #c62828;
}

.pred-healthy {
    background: #c8f7c5;
    color: #1b5e20;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 13px;
}

.pred-unhealthy {
    background: #ffcdd2;
    color: #b71c1c;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 13px;
}

/* ================= PAGINATION ================= */
.pagination {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.pagination button {
    padding: 8px 14px;
    margin: 0 3px;
    border: none;
    border-radius: 6px;
    background: #c8f7c5;
    color: #1b5e20;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s ease;
}

.pagination button:hover {
    background: #a5e3a0;
}

.pagination button.active {
    background: #1b5e20;
    color: white;
}

/* ================= RESPONSIVE ================= */
@media(max-width: 768px){
    .search-bar { flex-direction: column; align-items: flex-start; }
    .search-bar input[type="text"] { width: 100%; }
    .predictions-table th, .predictions-table td { font-size: 13px; }
    .summary-cards { grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); }
}
</style>

<script>
// Sample predictions data
const predictionsData = [
    {bird: "Parrot", region: "Karnataka", freq: 2.5, prediction: "Healthy", confidence: 92, user: "John Doe", date: "2025-12-12"},
    {bird: "Hen", region: "Tamil Nadu", freq: 3.1, prediction: "Unhealthy", confidence: 70, user: "Jane Smith", date: "2025-12-11"},
    {bird: "Pigeon", region: "Kerala", freq: 2.0, prediction: "Healthy", confidence: 88, user: "Ravi Kumar", date: "2025-12-10"},
    {bird: "Sparrow", region: "Maharashtra", freq: 1.8, prediction: "Unhealthy", confidence: 65, user: "Priya Sharma", date: "2025-12-09"},
    {bird: "Peacock", region: "Andhra Pradesh", freq: 3.5, prediction: "Healthy", confidence: 95, user: "Amit Singh", date: "2025-12-08"},
    {bird: "Crow", region: "Telangana", freq: 2.2, prediction: "Healthy", confidence: 90, user: "Neha Gupta", date: "2025-12-07"},
    {bird: "Duck", region: "Odisha", freq: 2.7, prediction: "Unhealthy", confidence: 72, user: "Suresh Reddy", date: "2025-12-06"},
    {bird: "Owl", region: "Karnataka", freq: 2.1, prediction: "Healthy", confidence: 85, user: "Anjali Mehta", date: "2025-12-05"},
    {bird: "Cockatoo", region: "Tamil Nadu", freq: 3.0, prediction: "Healthy", confidence: 91, user: "Vikram Patel", date: "2025-12-04"},
    {bird: "Robin", region: "Kerala", freq: 1.9, prediction: "Unhealthy", confidence: 68, user: "Kavita Desai", date: "2025-12-03"}
];

// Summary calculation
function calculateSummary() {
    const total = predictionsData.length;
    const healthy = predictionsData.filter(p => p.prediction === "Healthy").length;
    const unhealthy = total - healthy;
    return {total, healthy, unhealthy};
}

// Pagination
let currentPage = 1;
const rowsPerPage = 5;

function renderTable(page = 1) {
    const tableBody = document.getElementById("predictionsTableBody");
    tableBody.innerHTML = "";
    currentPage = page;

    const start = (page - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const pageData = predictionsData.slice(start, end);

    pageData.forEach((pred, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${start + index + 1}</td>
            <td>${pred.bird}</td>
            <td>${pred.region}</td>
            <td>${pred.freq}</td>
            <td><span class="${pred.prediction === "Healthy" ? "pred-healthy" : "pred-unhealthy"}">${pred.prediction}</span></td>
            <td>${pred.confidence}%</td>
            <td>${pred.user}</td>
            <td>${pred.date}</td>
            <td>
                <button class="action-btn view-btn" onclick="viewPrediction(${start + index})">View</button>
                <button class="action-btn delete-btn" onclick="deletePrediction(${start + index})">Delete</button>
            </td>
        `;
        tableBody.appendChild(tr);
    });

    renderPagination();
}

function renderPagination() {
    const paginationDiv = document.getElementById("pagination");
    paginationDiv.innerHTML = "";
    const totalPages = Math.ceil(predictionsData.length / rowsPerPage);

    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.innerText = i;
        if (i === currentPage) btn.classList.add("active");
        btn.addEventListener("click", () => renderTable(i));
        paginationDiv.appendChild(btn);
    }
}

function viewPrediction(index) {
    alert(`Viewing Prediction:\nBird: ${predictionsData[index].bird}\nRegion: ${predictionsData[index].region}\nUser: ${predictionsData[index].user}`);
}

function deletePrediction(index) {
    if (confirm("Are you sure you want to delete this prediction?")) {
        predictionsData.splice(index, 1);
        renderTable(currentPage);
        renderSummary();
    }
}

function searchPredictions() {
    const query = document.getElementById("searchInput").value.toLowerCase();
    const filteredData = predictionsData.filter(p =>
        p.bird.toLowerCase().includes(query) || 
        p.region.toLowerCase().includes(query) || 
        p.user.toLowerCase().includes(query)
    );

    const tableBody = document.getElementById("predictionsTableBody");
    tableBody.innerHTML = "";
    filteredData.forEach((pred, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${pred.bird}</td>
            <td>${pred.region}</td>
            <td>${pred.freq}</td>
            <td><span class="${pred.prediction === "Healthy" ? "pred-healthy" : "pred-unhealthy"}">${pred.prediction}</span></td>
            <td>${pred.confidence}%</td>
            <td>${pred.user}</td>
            <td>${pred.date}</td>
            <td>
                <button class="action-btn view-btn" onclick="viewPrediction(${index})">View</button>
                <button class="action-btn delete-btn" onclick="deletePrediction(${index})">Delete</button>
            </td>
        `;
        tableBody.appendChild(tr);
    });

    renderPagination();
}

function renderSummary() {
    const summary = calculateSummary();
    document.getElementById("totalPred").innerText = summary.total;
    document.getElementById("healthyPred").innerText = summary.healthy;
    document.getElementById("unhealthyPred").innerText = summary.unhealthy;
}

window.onload = function() {
    renderSummary();
    renderTable();
};
</script>

</head>
<body>
<div class="page-overlay">

<!-- Navbar -->
<div class="navbar">
    <div class="logo">AEROSENSE</div>
    <div>
        <a href="admin_home.html">Dashboard</a>
        <a href="users.html">Users</a>
        <a href="predictions.html">Predictions</a>
        <a href="settings.html">Settings</a>
        <a href="login.html">Logout</a>
    </div>
</div>

<div class="container">
<h1>Predictions Management</h1>
<div class="subtitle">View and Manage All Bird Health Predictions</div>

<!-- Summary Cards -->
<div class="summary-cards">
    <div class="summary-card">
        <div class="summary-title">Total Predictions</div>
        <div class="summary-value" id="totalPred">0</div>
    </div>
    <div class="summary-card">
        <div class="summary-title">Healthy Predictions</div>
        <div class="summary-value" id="healthyPred">0</div>
    </div>
    <div class="summary-card">
        <div class="summary-title">Unhealthy Predictions</div>
        <div class="summary-value" id="unhealthyPred">0</div>
    </div>
</div>

<!-- Search Bar -->
<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by bird, region or user">
    <button onclick="searchPredictions()">Search</button>
</div>

<!-- Predictions Table -->
<table class="predictions-table">
    <thead>
        <tr>
            <th>#</th>
            <th>Bird Name</th>
            <th>Region</th>
            <th>Frequency</th>
            <th>Prediction</th>
            <th>Confidence</th>
            <th>User</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="predictionsTableBody">
        <!-- Populated by JS -->
    </tbody>
</table>

<!-- Pagination -->
<div class="pagination" id="pagination"></div>

</div>
</div>
</body>
</html>
