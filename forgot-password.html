<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password - Aerosense</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    /* FULL PAGE SCROLL + FIXED BACKGROUND */
    body {
        min-height: 100vh;
        background: url("images/login.jpg") no-repeat center center fixed;
        background-size: cover;
        position: relative;
    }

    /* Dark overlay */
    .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 70, 30, 0.45);
        z-index: 1;
    }

    /* Centered box */
    .container {
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 60px 20px;
        position: relative;
        z-index: 2;
    }

    .forgot-box {
        width: 100%;
        max-width: 420px;
        background: white;
        padding: 35px 30px;
        border-radius: 15px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.25);
    }

    .logo {
        width: 80px;
        display: block;
        margin: 0 auto 15px;
    }

    .title {
        text-align: center;
        font-size: 28px;
        font-weight: 700;
        color: #2e7d32;
        margin-bottom: 8px;
    }

    .subtitle {
        text-align: center;
        color: #444;
        margin-bottom: 25px;
        font-size: 15px;
    }

    /* Input */
    .input-box {
        margin-bottom: 20px;
    }

    .input-box label {
        display: block;
        font-weight: 600;
        margin-bottom: 5px;
    }

    .input-box input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 15px;
    }

    .submit-btn {
        width: 100%;
        padding: 14px;
        background: #43a047;
        border: none;
        color: white;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 5px;
    }

    .submit-btn:hover {
        background: #2e7d32;
    }

    .back-login {
        text-align: center;
        margin-top: 15px;
    }

    .back-login a {
        color: #222;
        text-decoration: none;
        font-size: 14px;
    }
</style>

<script>
function submitRequest(event) {
    event.preventDefault();

    alert("Password reset link sent to your email!");
    window.location.href = "login.html";
}
</script>

</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="forgot-box">

        <img src="images/logo.png" class="logo">

        <div class="title">Forgot Password</div>
        <div class="subtitle">Enter your email to receive a reset link</div>

        <form onsubmit="submitRequest(event)">
            <div class="input-box">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter registered email" required>
            </div>

            <button type="submit" class="submit-btn">Send Reset Link</button>
        </form>

        <div class="back-login">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>
</div>

</body>
</html>
